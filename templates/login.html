<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Kehlosastra</title>
  <meta name="description" content="Log in to Kehlosastra with your SASTRA email." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="auth-body">

<div class="auth-wrap">
  <!-- Logo -->
  <a href="/" class="auth-logo">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Kehlosastra" />
  </a>

  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Log in with your SASTRA email to continue.</p>
    </div>

    <!-- Flash -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
      <div class="auth-alert auth-alert--{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST" action="/login" class="auth-form">
      <div class="form-group">
        <label class="form-label">SASTRA Email</label>
        <input type="email" name="email" class="form-input"
               placeholder="yourname@sastra.ac.in" required autofocus />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-pw-wrap">
          <input type="password" name="password" id="loginPwd" class="form-input"
                 placeholder="Enter your password" required />
          <button type="button" class="pw-toggle" onclick="togglePw('loginPwd', this)">👁</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Log In →</button>
    </form>

    <p class="auth-switch">
      Don't have an account? <a href="/register">Create one</a>
    </p>
  </div>
</div>

<script>
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}
</script>
</body>
</html>
